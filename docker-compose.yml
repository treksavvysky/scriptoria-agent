services:
  scriptoria:
    build: .
    container_name: scriptoria
    restart: unless-stopped
    environment:
      # cortex-library runs on the shared 'cortex' network (cortex-os Dockerfile)
      LIBRARY_URL: http://cortex-library:8000
      CORTEX_API_TOKEN: ${CORTEX_API_TOKEN:-}
      SCRIPTORIA_API_TOKEN: ${SCRIPTORIA_API_TOKEN:?set in .env}
      SCRIPTORIA_WORKSPACES_ROOT: /data/workspaces
    volumes:
      # bind-mounted so the operator sees workspace files directly on the host
      - /home/architect/agents/workspaces:/data/workspaces
    ports:
      - "127.0.0.1:8020:8020"
    networks:
      - codejourney-proxy
      - cortex

networks:
  codejourney-proxy:
    external: true
  cortex:
    external: true
